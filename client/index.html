<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Noto+Sans+Devanagari:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Astrologer Hemraj Laddha — Vedic Astrology Suite</title>

    <!-- Ganesh boot-loader styles. Inlined so the splash paints on the very
         first network round-trip, before the React bundle is fetched. -->
    <style>
      :root {
        --vedic-cream: #FFF8E7;
        --vedic-gold: #C9A24F;
        --vedic-maroon: #7B1E1E;
        --vedic-saffron: #E69A23;
      }
      html, body { margin: 0; padding: 0; background: var(--vedic-cream); }

      #ganesh-boot {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, #FFFAEC 0%, var(--vedic-cream) 60%, #F5E6BE 100%);
        font-family: 'Noto Sans Devanagari', 'Fraunces', serif;
        color: var(--vedic-maroon);
        transition: opacity 600ms ease-out, visibility 600ms ease-out;
      }
      #ganesh-boot.is-hiding { opacity: 0; visibility: hidden; }

      .ganesh-frame {
        position: relative;
        width: 200px; height: 200px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 28px;
      }

      /* Soft golden halo behind the photo */
      .ganesh-halo {
        position: absolute; inset: -16px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(230, 154, 35, 0.45) 0%, rgba(230, 154, 35, 0) 70%);
        filter: blur(8px);
        animation: gnsh-halo 2.4s ease-in-out infinite;
      }
      @keyframes gnsh-halo {
        0%, 100% { transform: scale(1);   opacity: 0.7; }
        50%      { transform: scale(1.1); opacity: 1.0; }
      }

      /* The image (or fallback) sits inside a circular gold-bordered disc */
      .ganesh-disc {
        position: relative;
        width: 168px; height: 168px;
        border-radius: 50%;
        overflow: hidden;
        background: var(--vedic-cream);
        box-shadow:
          0 0 0 4px var(--vedic-gold),
          0 0 0 8px var(--vedic-cream),
          0 0 0 10px rgba(123, 30, 30, 0.45),
          0 12px 32px rgba(123, 30, 30, 0.18);
        animation: gnsh-pulse 3s ease-in-out infinite;
      }
      @keyframes gnsh-pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.04); }
      }

      .ganesh-disc img {
        width: 100%; height: 100%;
        object-fit: cover; display: block;
      }

      /* Fallback Om symbol — shown when /ganesh.png fails to load.
         The script below toggles .has-fallback on the parent. */
      #ganesh-boot .ganesh-disc .ganesh-fallback {
        display: none;
        width: 100%; height: 100%;
        align-items: center; justify-content: center;
        font-size: 110px; line-height: 1;
        color: var(--vedic-saffron);
        background:
          radial-gradient(circle at 50% 60%, #FFE9A6 0%, #FFD37A 60%, var(--vedic-cream) 100%);
        font-weight: 700;
        text-shadow: 0 4px 16px rgba(123, 30, 30, 0.35);
      }
      #ganesh-boot.has-fallback .ganesh-disc img       { display: none; }
      #ganesh-boot.has-fallback .ganesh-disc .ganesh-fallback { display: flex; }

      /* Sanskrit invocation */
      .ganesh-mantra {
        font-size: 22px; font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--vedic-maroon);
        margin: 0 0 6px 0;
      }

      /* Subtitle / loading text */
      .ganesh-subtitle {
        font-family: 'Fraunces', serif;
        font-size: 13px;
        color: rgba(123, 30, 30, 0.65);
        letter-spacing: 0.5px;
        margin: 0 0 24px 0;
      }

      /* Three-dot wave loading indicator */
      .ganesh-dots { display: flex; gap: 8px; }
      .ganesh-dots span {
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--vedic-saffron);
        animation: gnsh-dot 1.2s ease-in-out infinite;
      }
      .ganesh-dots span:nth-child(2) { animation-delay: 0.15s; }
      .ganesh-dots span:nth-child(3) { animation-delay: 0.30s; }
      @keyframes gnsh-dot {
        0%, 80%, 100% { transform: translateY(0);   opacity: 0.4; }
        40%           { transform: translateY(-8px); opacity: 1;   }
      }

      @media (prefers-reduced-motion: reduce) {
        .ganesh-halo, .ganesh-disc, .ganesh-dots span { animation: none; }
      }
    </style>
  </head>
  <body>
    <!-- Ganesh boot loader — renders instantly. React removes it on mount.
         Drop a 512×512 photo at /ganesh.png  (any square aspect works).
         If the file is missing, the Om-symbol fallback shows automatically. -->
    <div id="ganesh-boot">
      <div class="ganesh-frame">
        <div class="ganesh-halo"></div>
        <div class="ganesh-disc">
          <img
            src="/ganesh.png"
            alt="Lord Ganesha"
            onerror="document.getElementById('ganesh-boot').classList.add('has-fallback')"
          />
          <div class="ganesh-fallback" aria-hidden="true">ॐ</div>
        </div>
      </div>
      <h1 class="ganesh-mantra">श्री गणेशाय नमः</h1>
      <p class="ganesh-subtitle">Astrologer Hemraj Laddha · Vedic Astrology Suite</p>
      <div class="ganesh-dots" role="status" aria-label="Loading">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
